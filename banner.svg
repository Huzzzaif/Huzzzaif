<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a08"/>
      <stop offset="50%" style="stop-color:#111110"/>
      <stop offset="100%" style="stop-color:#0a0a08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="30%" style="stop-color:#C9A96E"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="70%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7355">
        <animate attributeName="stop-color" values="#8B7355;#D4AF37;#8B7355" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#D4AF37">
        <animate attributeName="stop-color" values="#D4AF37;#F5E6C8;#D4AF37" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#8B7355">
        <animate attributeName="stop-color" values="#8B7355;#D4AF37;#8B7355" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bg)"/>

  <!-- Subtle border frame -->
  <rect x="30" y="20" width="840" height="220" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.2" rx="2"/>
  <rect x="35" y="25" width="830" height="210" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.12" rx="1"/>

  <!-- Corner ornaments -->
  <!-- Top-left -->
  <line x1="30" y1="45" x2="55" y2="45" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <line x1="55" y1="20" x2="55" y2="45" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <!-- Top-right -->
  <line x1="845" y1="45" x2="870" y2="45" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <line x1="845" y1="20" x2="845" y2="45" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom-left -->
  <line x1="30" y1="215" x2="55" y2="215" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <line x1="55" y1="215" x2="55" y2="240" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom-right -->
  <line x1="845" y1="215" x2="870" y2="215" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <line x1="845" y1="215" x2="845" y2="240" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>

  <!-- Decorative line above name -->
  <rect x="370" y="65" width="160" height="0.8" fill="url(#gold)" opacity="0.5"/>

  <!-- Name -->
  <text x="450" y="105" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" fill="url(#goldShimmer)" filter="url(#glow)" letter-spacing="6">
    HUZAIF KHAN
  </text>

  <!-- Decorative line below name -->
  <rect x="370" y="118" width="160" height="0.8" fill="url(#gold)" opacity="0.5"/>

  <!-- Small diamond ornament -->
  <polygon points="450,128 454,134 450,140 446,134" fill="#C9A96E" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="450" y="165" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#A09880" letter-spacing="4" font-style="italic">
    Full-Stack Developer  ·  AI/ML Engineer
  </text>

  <!-- Tagline -->
  <text x="450" y="195" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6B6355" letter-spacing="3">
    FROM MODEL TO PRODUCTION
  </text>

  <!-- Bottom gold line -->
  <rect x="0" y="256" width="900" height="4" fill="url(#gold)" opacity="0.4"/>
</svg>
